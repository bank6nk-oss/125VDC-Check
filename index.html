<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>แบบตรวจสอบแบตเตอรี่ 125 VDC</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap');

    * { box-sizing: border-box; font-family: 'Sarabun', sans-serif; }
    body { font-size: 16px; padding: 15px; background-color: #f4f6f9; color: #333; margin: 0; }
    h1 { font-size: 18px; text-align: center; color: #111; margin-bottom: 20px; }
    
    .form-group { margin-bottom: 15px; }
    label { display: block; font-weight: bold; margin-bottom: 5px; }
    input[type="date"], input[type="number"], select {
      width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; background-color: #fff;
    }
    
    .table-responsive { overflow-x: auto; margin-top: 20px; border-radius: 4px; border: 1px solid #ddd; }
    table { width: 100%; border-collapse: collapse; min-width: 750px; background-color: #fff; }
    th, td { border: 1px solid #ddd; padding: 10px; text-align: center; vertical-align: middle; }
    th { background-color: #007bff; color: white; font-weight: bold; }
    
    .table-responsive input, .table-responsive select { padding: 6px; font-size: 14px; }
    
    .btn {
      display: block; width: 100%; padding: 14px; margin-top: 10px; font-size: 16px; font-weight: bold;
      color: white; border: none; border-radius: 4px; cursor: pointer; text-align: center; text-decoration: none;
    }
    .btn-add { background-color: #007bff; }
    .btn-save { background-color: #28a745; }
    
    /* สไตล์กล่องแจ้งเตือนเมื่อสร้าง PDF เสร็จ */
    .pdf-container {
      display: none; margin-top: 25px; padding: 15px; 
      background-color: #d4edda; border: 1px solid #c3e6cb; border-radius: 4px;
    }
    .btn-preview { background-color: #17a2b8; margin-bottom: 8px; }
    .btn-download { background-color: #ffc107; color: #212529; }
    
    .warning { color: red; font-weight: bold; font-size: 14px; }
  </style>
</head>
<body>

  <h1>แบบตรวจสอบแบตเตอรี่ 125 VDC</h1>

  <div class="form-group">
    <label for="checkDate">วันที่ตรวจสอบ:</label>
    <input type="date" id="checkDate">
  </div>

  <div class="form-group">
    <label for="chargeType">รูปแบบการชาร์จ:</label>
    <select id="chargeType">
      <option value="FLOAT CHARGE">FLOAT CHARGE</option>
      <option value="EQUALIZE CHARGE">EQUALIZE CHARGE</option>
    </select>
  </div>

  <div class="form-group">
    <label for="totalV">แรงดัน total (V):</label>
    <input type="number" id="totalV" step="0.01" placeholder="ระบุหน่วย VDC">
  </div>

  <div class="table-responsive">
    <table id="batteryTable">
      <thead>
        <tr>
          <th style="width: 7%;">ลูกที่</th>
          <th style="width: 15%;">สภาพภายนอก</th>
          <th style="width: 18%;">แรงดัน/cell (V)</th>
          <th style="width: 15%;">การยกตัว (มม.)</th>
          <th style="width: 25%;">รูปภาพ</th>
          <th style="width: 20%;">หมายเหตุ</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td class="row-number">1</td>
          <td>
            <select class="status">
              <option value="ปกติ">ปกติ</option>
              <option value="ผิดปกติ">ผิดปกติ</option>
            </select>
          </td>
          <td><input type="number" class="cellV" step="0.01" style="width: 80px;"> VDC</td>
          <td><input type="number" class="bulge" oninput="checkHeight(this)" style="width: 70px;"></td>
          <td><input type="file" accept="image/*" capture="environment" class="photoInput"></td>
          <td class="remark"></td>
        </tr>
      </tbody>
    </table>
  </div>

  <button class="btn btn-add" onclick="addRow()">➕ เพิ่มแถว</button>
  <button class="btn btn-save" onclick="sendData()">💾 บันทึกข้อมูลและสร้าง PDF</button>

  <div id="pdfSection" class="pdf-container">
    <p style="color: #155724; font-weight: bold; margin-top: 0; font-size: 18px; text-align: center;">🎉 สร้างไฟล์ PDF สำเร็จแล้ว!</p>
    <a id="previewLink" class="btn btn-preview" target="_blank">👁️ กดเพื่อดูตัวอย่างไฟล์ PDF</a>
    <a id="downloadLink" class="btn btn-download" target="_blank">📥 กดเพื่อดาวน์โหลดไฟล์ PDF ลงเครื่อง</a>
  </div>

  <script>
    // ⚠️ อย่าลืมนำ URL Web App ที่ได้จาก Google Apps Script มาวางที่นี่นะครับ
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxApVbNGFhKaEzPK-xW0OBsyrUlwDMFGEyQkVIMtYVwUFKAoChJY0x7ebBV742e6GEHuw/exec";

    function addRow() {
      let table = document.getElementById("batteryTable").getElementsByTagName('tbody')[0];
      let rowCount = table.rows.length + 1;
      let row = table.insertRow(-1);
      
      row.innerHTML = `
        <td class="row-number">${rowCount}</td>
        <td>
          <select class="status">
            <option value="ปกติ">ปกติ</option>
            <option value="ผิดปกติ">ผิดปกติ</option>
          </select>
        </td>
        <td><input type="number" class="cellV" step="0.01" style="width: 80px;"> VDC</td>
        <td><input type="number" class="bulge" oninput="checkHeight(this)" style="width: 70px;"></td>
        <td><input type="file" accept="image/*" capture="environment" class="photoInput"></td>
        <td class="remark"></td>
      `;
    }

    function checkHeight(el) {
      let row = el.parentElement.parentElement;
      let remarkCell = row.querySelector('.remark');
      if (parseFloat(el.value) > 8) {
        remarkCell.innerHTML = '<span class="warning">มีความสูงเกิน 8 มม.</span>';
      } else {
        remarkCell.innerHTML = '';
      }
    }

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        if (!file) resolve(null);
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
      });
    }

    async function sendData() {
      const date = document.getElementById('checkDate').value;
      const chargeType = document.getElementById('chargeType').value;
      const totalV = document.getElementById('totalV').value;

      if (!date) { alert('กรุณาเลือกวันที่ตรวจสอบก่อนครับ'); return; }

      const tableRows = document.getElementById('batteryTable').getElementsByTagName('tbody')[0].rows;
      let payloadRows = [];

      for (let i = 0; i < tableRows.length; i++) {
        let row = tableRows[i];
        let num = row.querySelector('.row-number').innerText;
        let status = row.querySelector('.status').value;
        let cellV = row.querySelector('.cellV').value;
        let bulge = row.querySelector('.bulge').value;
        let photoInput = row.querySelector('.photoInput');
        let remark = row.querySelector('.remark').innerText;

        if (status === 'ผิดปกติ' && photoInput.files.length === 0) {
          alert(`ลูกที่ ${num} มีสภาพผิดปกติ กรุณาถ่ายรูปภาพประกอบด้วยครับ!`);
          return;
        }

        let photoData = null;
        if (photoInput.files.length > 0) {
          photoData = await fileToBase64(photoInput.files[0]);
        }

        payloadRows.push({
          num: num, status: status, cellV: cellV, bulge: bulge, remark: remark, photoData: photoData
        });
      }

      // ซ่อนโซน PDF เก่าก่อน (ถ้ามี)
      document.getElementById('pdfSection').style.display = 'none';
      alert('ระบบกำลังอัปโหลดรูปภาพและสร้างไฟล์ PDF อาจใช้เวลาประมาณ 10-15 วินาที กรุณารอสักครู่นะครับ...');

      // ส่งข้อมูลไปยังหลังบ้าน (นำแผงควบคุม CORS ออกเพื่อให้รับค่าขากลับได้)
      fetch(WEB_APP_URL, {
        method: 'POST',
        body: JSON.stringify({
          date: date, chargeType: chargeType, totalV: totalV, rows: payloadRows
        })
      })
      .then(res => res.json()) // แปลงข้อมูลผลลัพธ์ที่ Google ส่งกลับมาให้กลายเป็น JSON
      .then(result => {
        if(result.status === "success") {
          alert('🎉 บันทึกข้อมูลและสร้าง PDF เรียบร้อยแล้ว! สามารถกดดูไฟล์ได้ที่ปุ่มด้านล่างครับ');
          
          // กำหนดลิงก์ให้กับปุ่ม ดูตัวอย่าง และ ดาวน์โหลด
          const previewLink = document.getElementById('previewLink');
          const downloadLink = document.getElementById('downloadLink');
          
          previewLink.href = result.pdfUrl;
          // แปลงลิงก์ของ Google Drive ให้กลายเป็นลิงก์สำหรับกดดาวน์โหลดโดยตรง (Direct Download)
          downloadLink.href = result.pdfUrl.replace('/view?usp=drivesdk', '/download?export=download').replace('/view', '/download');
          
          // เปิดแสดงกล่องปุ่ม PDF และเลื่อนหน้าจอลงมาให้เห็นชัดๆ
          const pdfSection = document.getElementById('pdfSection');
          pdfSection.style.display = 'block';
          pdfSection.scrollIntoView({ behavior: 'smooth' });
        } else {
          alert('หลังบ้านแจ้งเกิดข้อผิดพลาดในการสร้างไฟล์');
        }
      })
      .catch(err => {
        alert('เกิดข้อผิดพลาดในการเชื่อมต่อ: ' + err);
      });
    }
  </script>
</body>
</html>
