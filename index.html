<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: sans-serif; padding: 20px; }
    h1 { font-size: 18px; }
    div, label, table { font-size: 16px; }
    table, th, td { border: 1px solid black; border-collapse: collapse; padding: 5px; }
    .warning { color: red; font-weight: bold; }
  </style>
</head>
<body>
  <h1>แบบตรวจสอบแบตเตอรี่ 125 VDC</h1>
  <label>วันที่ตรวจสอบ:</label> <input type="date" id="checkDate"><br><br>
  <label>รูปแบบการชาร์จ:</label>
  <select id="chargeType"><option value="FLOAT">FLOAT CHARGE</option><option value="EQUAL">EQUALIZE CHARGE</option></select>
  
  <table id="batteryTable">
    <tr><th>ลูกที่</th><th>สภาพภายนอก</th><th>แรงดัน (V)</th><th>การยกตัว (มม.)</th><th>รูปภาพ</th><th>หมายเหตุ</th></tr>
    <tr>
      <td>1</td>
      <td><select class="status"><option value="ปกติ">ปกติ</option><option value="ผิดปกติ">ผิดปกติ</option></select></td>
      <td><input type="number" class="cellV"></td>
      <td><input type="number" class="bulge" oninput="checkHeight(this)"></td>
      <td><input type="file" accept="image/*" capture="environment" class="photoInput"></td>
      <td class="remark"></td>
    </tr>
  </table>
  <br>
  <button onclick="addRow()">เพิ่มแถว</button>
  <button onclick="sendData()">บันทึกข้อมูล</button>

  <script>
    function addRow() { /* (โค้ดเพิ่มแถวเดิมที่ให้ไป) */ }
    function checkHeight(el) { /* (โค้ดเช็คความสูงเดิมที่ให้ไป) */ }
    
    function sendData() {
      // ดึงข้อมูลจากตารางและส่งไปที่ Web App URL ของ Apps Script
      // โดยใช้ fetch() ส่งเป็น JSON ไปยัง URL ของ Apps Script
      alert("กำลังบันทึกข้อมูล...");
    }
  </script>
</body>
</html>
